resources:
  App\CompanySubdomain\SomeModule\Domain\ExampleApiResource:
    operations:
      ApiPlatform\Metadata\Get:
        provider: 'App\CompanySubdomain\SomeModule\Application\Provider\ExampleApiResourceProvider'
        openapi:
          responses:
            '200':
              description: 'ExampleApiResource resource'
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/ExampleApiResource'
            default:
              description: 'Problem response.'

  App\Internal\HealthCheck\Domain\ValueObject\HealthCheck:
    operations:
      ApiPlatform\Metadata\Get:
        uriTemplate: '/health'
        controller: 'App\Internal\HealthCheck\Application\Controller\HealthCheckController'
        openapi:
          responses:
            '204':
              description: 'Health check passed with no content to return.'
            '500':
              description: 'Health check failed.'
            default:
              description: 'Problem response.'
