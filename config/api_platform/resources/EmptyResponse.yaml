resources:
  App\Shared\Application\DTO\EmptyResponse:
    exceptionToStatus:
      'App\User\Domain\Exception\UserTimedOutException': 429
      'App\User\Domain\Exception\UserNotFoundException': 404
      'App\User\Domain\Exception\InvalidPasswordException': 400
      'App\User\Domain\Exception\TokenNotFoundException': 404
      'App\User\Domain\Exception\DuplicateEmailException': 409
      'App\User\Domain\Exception\PasswordResetTokenNotFoundException': 404
      'App\User\Domain\Exception\PasswordResetTokenExpiredException': 400
      'App\User\Domain\Exception\PasswordResetTokenAlreadyUsedException': 400
      'App\User\Domain\Exception\PasswordResetTokenMismatchException': 400
      'App\User\Domain\Exception\PasswordResetRateLimitExceededException': 429
    operations:
      refresh_token_http:
        class: ApiPlatform\Metadata\Post
        method: POST
        uriTemplate: '/token'
        input: 'App\User\Application\DTO\RefreshTokenDto'
        processor: 'App\User\Application\Processor\RefreshTokenProcessor'
        read: false
        output: false
        openapi:
          summary: 'Refresh access token'
          description: 'Exchanges a valid refresh token for new access and refresh tokens (token rotation).'
          tags:
            - 'Authentication'
          responses:
            200:
              description: 'Tokens refreshed successfully'
            400:
              description: 'Invalid request payload'
            401:
              description: 'Invalid, expired, or revoked refresh token'
            422:
              description: 'Validation error'
      signin_http:
        class: ApiPlatform\Metadata\Post
        method: POST
        uriTemplate: '/signin'
        input: 'App\User\Application\DTO\SignInDto'
        processor: 'App\User\Application\Processor\SignInProcessor'
        read: false
        output: false
        openapi:
          summary: 'Sign in with email and password'
          description: 'Authenticates user credentials and returns access/refresh tokens or a pending 2FA session.'
          tags:
            - 'Authentication'
          responses:
            200:
              description: 'Sign-in succeeded'
            400:
              description: 'Invalid request payload'
            401:
              description: 'Invalid credentials'
            423:
              description: 'Account is temporarily locked'
            422:
              description: 'Validation error'
      signin_2fa_http:
        class: ApiPlatform\Metadata\Post
        method: POST
        uriTemplate: '/signin/2fa'
        input: 'App\User\Application\DTO\CompleteTwoFactorDto'
        processor: 'App\User\Application\Processor\CompleteTwoFactorProcessor'
        read: false
        output: false
        openapi:
          summary: 'Complete two-factor sign in'
          description: 'Validates pending 2FA session and TOTP code, then issues access and refresh tokens.'
          tags:
            - 'Authentication'
          responses:
            200:
              description: '2FA completed successfully'
            400:
              description: 'Invalid request payload'
            401:
              description: 'Invalid or expired 2FA session/code'
            422:
              description: 'Validation error'
      passkey_signup_options_http:
        class: ApiPlatform\Metadata\Post
        method: POST
        uriTemplate: '/passkeys/signup/options'
        input: 'App\User\Application\DTO\PasskeySignUpOptionsDto'
        processor: 'App\User\Application\Processor\PasskeySignUpOptionsProcessor'
        read: false
        output: false
        openapi:
          summary: 'Start passkey sign-up'
          description: 'Creates WebAuthn public key creation options for a new passkey-backed account.'
          tags:
            - 'Authentication'
          responses:
            200:
              description: 'Passkey creation options generated'
              content:
                application/json:
                  schema:
                    type: object
                    required: [challenge_id, public_key]
                    properties:
                      challenge_id: { type: string }
                      public_key:
                        type: object
                        additionalProperties: true
                  example:
                    challenge_id: '01KSEPASSKEYSIGNUP'
                    public_key:
                      challenge: 'base64url-challenge'
                      rp: { name: 'VilnaCRM', id: 'localhost' }
                      user: { id: 'base64url-user-id', name: 'user@example.test', displayName: 'Example User' }
                      pubKeyCredParams: [{ type: 'public-key', alg: -7 }]
                      authenticatorSelection:
                        userVerification: 'required'
                        residentKey: 'required'
                        requireResidentKey: true
                      timeout: 60000
            409:
              description: 'Email is already registered'
            422:
              description: 'Validation error'
      passkey_signup_complete_http:
        class: ApiPlatform\Metadata\Post
        method: POST
        uriTemplate: '/passkeys/signup/complete'
        input: 'App\User\Application\DTO\PasskeySignUpCompleteDto'
        processor: 'App\User\Application\Processor\PasskeySignUpCompleteProcessor'
        read: false
        output: false
        openapi:
          summary: 'Complete passkey sign-up'
          description: 'Verifies WebAuthn attestation, creates the account, stores the passkey, and issues tokens.'
          tags:
            - 'Authentication'
          responses:
            200:
              description: 'Passkey sign-up completed'
              content:
                application/json:
                  schema:
                    type: object
                    required: [2fa_enabled, access_token, refresh_token]
                    properties:
                      2fa_enabled: { type: boolean, enum: [false] }
                      access_token: { type: string }
                      refresh_token: { type: string }
                  example:
                    2fa_enabled: false
                    access_token: '<ACCESS_TOKEN_PLACEHOLDER>'
                    refresh_token: '<REFRESH_TOKEN_PLACEHOLDER>'
            401:
              description: 'Invalid or expired passkey challenge'
            409:
              description: 'Email or passkey credential is already registered'
            422:
              description: 'Validation error'
      passkey_register_options_http:
        class: ApiPlatform\Metadata\Post
        method: POST
        uriTemplate: '/passkeys/register/options'
        input: 'App\User\Application\DTO\PasskeyRegistrationOptionsDto'
        processor: 'App\User\Application\Processor\PasskeyRegistrationOptionsProcessor'
        security: "is_granted('ROLE_USER')"
        read: false
        output: false
        openapi:
          summary: 'Start authenticated passkey registration'
          description: 'Creates WebAuthn public key creation options for the authenticated user.'
          tags:
            - 'Authentication'
          responses:
            200:
              description: 'Passkey creation options generated'
              content:
                application/json:
                  schema:
                    type: object
                    required: [challenge_id, public_key]
                    properties:
                      challenge_id: { type: string }
                      public_key:
                        type: object
                        additionalProperties: true
                  example:
                    challenge_id: '01KSEPASSKEYREGISTER'
                    public_key:
                      challenge: 'base64url-challenge'
                      rp: { name: 'VilnaCRM', id: 'localhost' }
                      user: { id: 'base64url-user-id', name: 'user@example.test', displayName: 'Example User' }
                      pubKeyCredParams: [{ type: 'public-key', alg: -7 }]
                      excludeCredentials: []
                      authenticatorSelection:
                        userVerification: 'required'
                        residentKey: 'required'
                        requireResidentKey: true
                      timeout: 60000
            401:
              description: 'Authentication required'
      passkey_register_complete_http:
        class: ApiPlatform\Metadata\Post
        method: POST
        uriTemplate: '/passkeys/register/complete'
        input: 'App\User\Application\DTO\PasskeyRegistrationCompleteDto'
        processor: 'App\User\Application\Processor\PasskeyRegistrationCompleteProcessor'
        security: "is_granted('ROLE_USER')"
        read: false
        output: false
        openapi:
          summary: 'Complete authenticated passkey registration'
          description: 'Verifies WebAuthn attestation and stores the passkey for the authenticated user.'
          tags:
            - 'Authentication'
          responses:
            200:
              description: 'Passkey registered'
              content:
                application/json:
                  schema:
                    type: object
                    required: [credential_id]
                    properties:
                      credential_id: { type: string }
                  example:
                    credential_id: 'base64url-credential-id'
            401:
              description: 'Authentication required or invalid passkey challenge'
            409:
              description: 'Passkey credential is already registered'
            422:
              description: 'Validation error'
      passkey_signin_options_http:
        class: ApiPlatform\Metadata\Post
        method: POST
        uriTemplate: '/passkeys/signin/options'
        input: 'App\User\Application\DTO\PasskeySignInOptionsDto'
        processor: 'App\User\Application\Processor\PasskeySignInOptionsProcessor'
        read: false
        output: false
        openapi:
          summary: 'Start passkey sign in'
          description: 'Creates WebAuthn public key request options for username-first passkey sign in.'
          tags:
            - 'Authentication'
          responses:
            200:
              description: 'Passkey request options generated'
              content:
                application/json:
                  schema:
                    type: object
                    required: [challenge_id, public_key]
                    properties:
                      challenge_id: { type: string }
                      public_key:
                        type: object
                        additionalProperties: true
                  example:
                    challenge_id: '01KSEPASSKEYSIGNIN'
                    public_key:
                      challenge: 'base64url-challenge'
                      rpId: 'localhost'
                      allowCredentials: []
                      userVerification: 'required'
                      timeout: 60000
            422:
              description: 'Validation error'
      passkey_signin_complete_http:
        class: ApiPlatform\Metadata\Post
        method: POST
        uriTemplate: '/passkeys/signin/complete'
        input: 'App\User\Application\DTO\PasskeySignInCompleteDto'
        processor: 'App\User\Application\Processor\PasskeySignInCompleteProcessor'
        read: false
        output: false
        openapi:
          summary: 'Complete passkey sign in'
          description: 'Verifies WebAuthn assertion, updates the stored credential counter, and issues tokens.'
          tags:
            - 'Authentication'
          responses:
            200:
              description: 'Passkey sign-in completed'
              content:
                application/json:
                  schema:
                    oneOf:
                      - type: object
                        required: [2fa_enabled, access_token, refresh_token]
                        properties:
                          2fa_enabled: { type: boolean, enum: [false] }
                          access_token: { type: string }
                          refresh_token: { type: string }
                      - type: object
                        required: [2fa_enabled, pending_session_id]
                        properties:
                          2fa_enabled: { type: boolean, enum: [true] }
                          pending_session_id: { type: string }
                  example:
                    2fa_enabled: false
                    access_token: '<ACCESS_TOKEN_PLACEHOLDER>'
                    refresh_token: '<REFRESH_TOKEN_PLACEHOLDER>'
            401:
              description: 'Invalid passkey credential or challenge'
            422:
              description: 'Validation error'
      confirm_2fa_http:
        class: ApiPlatform\Metadata\Post
        method: POST
        uriTemplate: '/2fa/confirm'
        input: 'App\User\Application\DTO\ConfirmTwoFactorDto'
        processor: 'App\User\Application\Processor\ConfirmTwoFactorProcessor'
        security: "is_granted('ROLE_USER')"
        read: false
        output: false
        openapi:
          summary: 'Confirm two-factor authentication setup'
          description: 'Validates TOTP code, enables 2FA, generates recovery codes, and revokes other sessions.'
          tags:
            - 'Authentication'
          responses:
            200:
              description: '2FA confirmed, recovery codes returned'
            401:
              description: 'Invalid code or authentication required'
            422:
              description: 'Validation error'
      disable_2fa_http:
        class: ApiPlatform\Metadata\Post
        method: POST
        status: 204
        uriTemplate: '/2fa/disable'
        input: 'App\User\Application\DTO\DisableTwoFactorDto'
        processor: 'App\User\Application\Processor\DisableTwoFactorProcessor'
        security: "is_granted('ROLE_USER')"
        read: false
        output: false
        openapi:
          summary: 'Disable two-factor authentication'
          description: 'Verifies TOTP or recovery code, disables 2FA, clears secret, and deletes all recovery codes.'
          tags:
            - 'Authentication'
          responses:
            204:
              description: '2FA disabled successfully'
            401:
              description: 'Invalid code or authentication required'
            403:
              description: '2FA is not enabled'
            422:
              description: 'Validation error'
      regenerate_recovery_codes_http:
        class: ApiPlatform\Metadata\Post
        method: POST
        uriTemplate: '/2fa/recovery-codes'
        input: 'App\User\Application\DTO\RegenerateRecoveryCodesDto'
        processor: 'App\User\Application\Processor\RegenerateRecoveryCodesProcessor'
        security: "is_granted('ROLE_USER')"
        read: false
        output: false
        openapi:
          summary: 'Regenerate recovery codes'
          description: 'Invalidates all existing recovery codes and generates 8 new ones. Requires recent authentication (sudo mode).'
          tags:
            - 'Authentication'
          responses:
            200:
              description: 'Recovery codes regenerated'
            401:
              description: 'Authentication required'
            403:
              description: '2FA not enabled or re-authentication required'
      setup_2fa_http:
        class: ApiPlatform\Metadata\Post
        method: POST
        uriTemplate: '/2fa/setup'
        input: 'App\User\Application\DTO\SetupTwoFactorDto'
        processor: 'App\User\Application\Processor\SetupTwoFactorProcessor'
        security: "is_granted('ROLE_USER')"
        read: false
        output: false
        openapi:
          summary: 'Set up two-factor authentication'
          description: 'Generates a TOTP secret and provisioning URI for the authenticated user.'
          tags:
            - 'Authentication'
          responses:
            200:
              description: '2FA setup payload generated'
            400:
              description: 'Invalid request payload'
            401:
              description: 'Authentication required'
      request_password_reset:
        class: ApiPlatform\Metadata\Post
        method: POST
        status: 204
        uriTemplate: '/reset-password'
        input: 'App\User\Application\DTO\RequestPasswordResetDto'
        controller: 'App\User\Application\Controller\RequestPasswordResetController'
        output: false
        read: false
        openapi:
          summary: 'Request a password reset'
          description: 'Initiates a password reset process by sending a reset token to the provided email address.'
          tags:
            - 'User reset password'
          responses:
            204:
              description: 'Password reset request accepted'
            400:
              description: 'Invalid request payload'
            404:
              description: 'User not found'
            422:
              description: 'Validation error'
            429:
              description: 'Password reset rate limit exceeded'
      confirm_password_reset:
        class: ApiPlatform\Metadata\Post
        method: POST
        status: 204
        uriTemplate: '/reset-password/confirm'
        input: 'App\User\Application\DTO\ConfirmPasswordResetDto'
        controller: 'App\User\Application\Controller\ConfirmPasswordResetController'
        output: false
        read: false
        openapi:
          summary: 'Confirm a password reset'
          description: 'Completes the password reset process by validating the reset token and setting a new password.'
          tags:
            - 'User reset password'
          responses:
            204:
              description: 'Password reset confirmed'
            400:
              description: 'Invalid or expired password reset token'
            404:
              description: 'Password reset token not found'
            422:
              description: 'Validation error'
      signout_http:
        class: ApiPlatform\Metadata\Post
        method: POST
        status: 204
        uriTemplate: '/signout'
        input: 'App\User\Application\DTO\SignOutDto'
        processor: 'App\User\Application\Processor\SignOutProcessor'
        security: "is_granted('ROLE_USER')"
        read: false
        output: false
        openapi:
          summary: 'Sign out (logout) from current session'
          description: 'Revokes the current session and all associated refresh tokens, clears the session cookie.'
          tags:
            - 'Authentication'
          responses:
            204:
              description: 'Signed out successfully'
            400:
              description: 'Invalid request payload'
            401:
              description: 'Authentication required'
      signout_all_http:
        class: ApiPlatform\Metadata\Post
        method: POST
        status: 204
        uriTemplate: '/signout/all'
        input: 'App\User\Application\DTO\SignOutAllDto'
        processor: 'App\User\Application\Processor\SignOutAllProcessor'
        security: "is_granted('ROLE_USER')"
        read: false
        output: false
        openapi:
          summary: 'Sign out from all sessions (all devices)'
          description: 'Revokes all sessions and refresh tokens for the authenticated user, clears the session cookie.'
          tags:
            - 'Authentication'
          responses:
            204:
              description: 'Signed out from all sessions successfully'
            400:
              description: 'Invalid request payload'
            401:
              description: 'Authentication required'
            422:
              description: 'Validation error'
