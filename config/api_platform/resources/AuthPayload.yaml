        deserialize: false
        output: 'App\User\Application\DTO\AuthPayload'
        normalizationContext:
          groups: ['auth:output']
        denormalizationContext:
          groups: []
        extraArgs:
          email:
            type: 'String!'
          password:
            type: 'String!'
          rememberMe:
            type: 'Boolean'
