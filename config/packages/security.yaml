# config/packages/security.yaml
security:
  access_control:
    - { path: ^/api/users$, methods: [POST], roles: PUBLIC_ACCESS }
    - { path: ^/api/users/confirm$, methods: [PATCH], roles: PUBLIC_ACCESS }
    - { path: ^/api/reset-password, roles: PUBLIC_ACCESS }
    - { path: ^/api/auth/social, roles: PUBLIC_ACCESS }
    - { path: ^/api/signin, roles: PUBLIC_ACCESS }
    - { path: ^/api/token$, methods: [POST], roles: PUBLIC_ACCESS }
    - { path: ^/api/oauth/token$, methods: [POST], roles: PUBLIC_ACCESS }
    - { path: ^/api/docs, roles: PUBLIC_ACCESS }
    - { path: ^/api/health, roles: PUBLIC_ACCESS }
    - { path: ^/api/\.well-known, roles: PUBLIC_ACCESS }
    - { path: ^/healthz, roles: PUBLIC_ACCESS }
    - { path: ^/api/users/batch$, methods: [POST], roles: ROLE_SERVICE }
    - { path: ^/api/graphql, methods: [POST], roles: PUBLIC_ACCESS }
    - { path: ^/api/, roles: ROLE_USER }
    - { path: ^/authorize, roles: IS_AUTHENTICATED_REMEMBERED }

  providers:
    app_user_provider:
      memory: null

  firewalls:
    dev:
      pattern: ^/(_(profiler|wdt)|css|images|js)/
      security: false

    oauth:
      pattern: ^/api/\.well-known
      security: false

    api:
      pattern: ^/
      stateless: true
      entry_point: App\Shared\Infrastructure\Adapter\DualAuthenticator
      custom_authenticators:
        - App\Shared\Infrastructure\Adapter\DualAuthenticator

  password_hashers:
    App\User\Domain\Entity\User:
      algorithm: auto
      cost: 12 # AC: NFR-32 - bcrypt cost upgrade for security
      migrate_from:
        - bcrypt # AC: NFR-32 - support transparent upgrade from bcrypt (cost 4)
