framework:
  rate_limiter:
    global_api_anonymous:
      policy: 'token_bucket'
      limit: '%env(int:GLOBAL_API_ANONYMOUS_RATE_LIMIT_MAX_REQUESTS)%'
      rate:
        {
          interval: '%env(string:GLOBAL_API_ANONYMOUS_RATE_LIMIT_INTERVAL)%',
          amount: '%env(int:GLOBAL_API_ANONYMOUS_RATE_LIMIT_MAX_REQUESTS)%',
        }
      cache_pool: 'cache.app'
