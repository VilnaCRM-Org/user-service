api_platform:
  title: 'PHP Service Template API'
  description: 'This API provides endpoints to manage php service template data within a VilnaCRM.'
  version: '1.0.0'

  use_symfony_listeners: false

  openapi:
    overrideResponses: false
    contact:
      name: 'VilnaCRM Support'
      url: 'https://github.com/VilnaCRM-Org/php-service-template'
      email: 'support@vilnacrm.com'
    license:
      name: 'CC0-1.0'
      url: 'https://creativecommons.org/publicdomain/zero/1.0/'

  graphql:
    enabled: true
    graphiql:
      enabled: false

  defaults:
    extra_properties:
      rfc_7807_compliant_errors: true

  formats:
    json: ['application/json']

  error_formats:
    jsonproblem: ['application/problem+json']

  resource_class_directories:
    - '%kernel.project_dir%/src/Internal/HealthCheck/Domain/ValueObject'
