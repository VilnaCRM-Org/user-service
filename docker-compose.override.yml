# Development environment override
services:
  php:
    build:
      target: frankenphp_dev
    volumes:
      - ./:/srv/app
      - /srv/app/vendor
      - ./infrastructure/docker/php/conf.d/app.dev.ini:/usr/local/etc/php/conf.d/app.dev.ini:ro
      - ./infrastructure/docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      # Keep dependencies in a container-managed volume so make start can
      # refresh them without relying on host-side installs.
    environment:
      APP_ENV: dev
      APP_RUNTIME_HTTP_ENV: '${APP_RUNTIME_HTTP_ENV:-dev}'
      CI: '${CI:-}'
      XDEBUG_MODE: '${XDEBUG_MODE:-off}'
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - target: 8081
        published: ${APP_HTTP_TEST_PORT:-8081}
        protocol: tcp

  structurizr:
    image: structurizr/lite:2024.07.02
    ports:
      - '${STRUCTURIZR_PORT}:8080'
    volumes:
      - ./:/usr/local/structurizr

  localstack:
    image: localstack/localstack:3.4.0
    ports:
      - '${LOCALSTACK_PORT}:4566'
    environment:
      - SERVICES=sqs,ec2,s3,iam,sts
      - DEBUG=1
    volumes:
      - localstack_data:/var/lib/localstack
      - ./infrastructure/docker/php/init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh

volumes:
  localstack_data:
