openapi: 3.1.0
info:
  title: 'PHP Service Template API'
  description: 'This API provides endpoints to manage php service template data within a VilnaCRM.'
  contact:
    name: 'VilnaCRM Support'
    url: 'https://github.com/VilnaCRM-Org/php-service-template'
    email: support@vilnacrm.com
  license:
    name: CC0-1.0
    url: 'https://creativecommons.org/publicdomain/zero/1.0/'
  version: 1.0.0
servers:
  -
    url: /
    description: ''
paths:
  /api/example_api_resources:
    get:
      operationId: api_example_api_resources_get
      tags:
        - ExampleApiResource
      responses:
        '200':
          description: 'ExampleApiResource resource'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExampleApiResource'
        default:
          description: 'Problem response.'
      summary: 'Retrieves a ExampleApiResource resource.'
      description: 'Retrieves a ExampleApiResource resource.'
      parameters: []
      deprecated: false
  /api/health:
    get:
      operationId: api_health_get
      tags:
        - HealthCheck
      responses:
        '204':
          description: 'Health check passed with no content to return.'
        '500':
          description: 'Health check failed.'
        default:
          description: 'Problem response.'
      summary: 'Retrieves a HealthCheck resource.'
      description: 'Retrieves a HealthCheck resource.'
      parameters: []
      deprecated: false
components:
  schemas:
    ExampleApiResource:
      type: object
      description: ''
      deprecated: false
    HealthCheck:
      type: object
      description: ''
      deprecated: false
  responses: {  }
  parameters: {  }
  examples: {  }
  requestBodies: {  }
  headers: {  }
  securitySchemes: {  }
security: []
tags:
  -
    name: ExampleApiResource
    description: 'Template example resource endpoints.'
  -
    name: HealthCheck
    description: 'Runtime health-check endpoints.'
webhooks: {  }
