name: GraphQL spec backward comparability

on:
  pull_request:
    branches: ['main']

jobs:
  graphql-diff:
    name: Openapi-diff
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Start application
        run: make start

      - name: Setup test db
        run: make setup-test-db

      - name: Generate GraphQL spec
        run: make generate-graphql-spec

      - name: Copy GraphQL spec to host
        run: docker cp php-service-template-php-1:/srv/app/.github/graphql-spec/spec .github/graphql-spec/spec

      - name: Commit changes
        uses: EndBug/add-and-commit@a94899bca583c204427a224a7af87c02f9b325d5 # v9
        with:
          add: '.github/graphql-spec/spec'
          message: 'feat(#${{ toJSON(github.event.number) }}): generate graphql spec'

      - name: GraphQL Inspector
        uses: kamilkisiela/graphql-inspector@91cefc9d934ccac1b4be9f26f44b6f533c300247 # release-1701263349990
        with:
          schema: '${{ github.base_ref }}:.github/graphql-spec/spec'
        env:
          GITHUB_TOKEN: ${{ github.token }}
