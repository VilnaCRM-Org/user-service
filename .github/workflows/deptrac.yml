name: Architecture static analysis tool

on:
  pull_request:
    branches: ['main']

jobs:
  deptrac:
    name: Deptrac
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Start Application
        run: make start

      - name: Run Deptrac
        run: CI=1 make deptrac
