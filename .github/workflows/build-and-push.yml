name: Build and push production image

on:
  workflow_dispatch:
  push:
    branches: ['main']

permissions:
  contents: read
  id-token: write

concurrency:
  group: production-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        run: |
          OIDC_TOKEN="$(curl -fsSL \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com" \
            | jq -r '.value')"

          CREDENTIALS="$(aws sts assume-role-with-web-identity \
            --role-arn "${AWS_ROLE_TO_ASSUME}" \
            --role-session-name "github-actions-user-service-${GITHUB_RUN_ID}" \
            --web-identity-token "${OIDC_TOKEN}" \
            --duration-seconds 3600)"

          {
            echo "AWS_ACCESS_KEY_ID=$(jq -r '.Credentials.AccessKeyId' <<< "${CREDENTIALS}")"
            echo "AWS_SECRET_ACCESS_KEY=$(jq -r '.Credentials.SecretAccessKey' <<< "${CREDENTIALS}")"
            echo "AWS_SESSION_TOKEN=$(jq -r '.Credentials.SessionToken' <<< "${CREDENTIALS}")"
            echo "AWS_REGION=${AWS_REGION}"
          } >> "$GITHUB_ENV"

      - name: Log in to Amazon ECR
        run: |
          aws ecr get-login-password --region "${AWS_REGION}" \
            | docker login \
              --username AWS \
              --password-stdin "${{ secrets.ECR_REGISTRY }}"

      - name: Prepare image metadata
        id: image
        run: |
          IMAGE_URI="${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}"
          IMAGE_TAG="${GITHUB_SHA::12}"

          {
            echo "image_uri=${IMAGE_URI}"
            echo "image_tag=${IMAGE_TAG}"
            echo "versioned_image=${IMAGE_URI}:${IMAGE_TAG}"
            echo "latest_image=${IMAGE_URI}:latest"
          } >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker pull "${{ steps.image.outputs.latest_image }}" || true
          docker build \
            --target app_php \
            --cache-from "${{ steps.image.outputs.latest_image }}" \
            --tag "${{ steps.image.outputs.versioned_image }}" \
            --tag "${{ steps.image.outputs.latest_image }}" \
            -f Dockerfile .

      - name: Push Docker image to ECR
        run: |
          docker push "${{ steps.image.outputs.versioned_image }}"
          docker push "${{ steps.image.outputs.latest_image }}"

      - name: Start ECR image scan
        run: |
          if ! aws ecr start-image-scan \
            --repository-name "${{ secrets.ECR_REPOSITORY }}" \
            --image-id imageTag="${{ steps.image.outputs.image_tag }}"; then
            echo "ECR image scan was not started. The repository may use enhanced scanning or scan on push."
          fi
