name: Load testing

on:
  pull_request:
    branches: ['main']

jobs:
  load-tests:
    name: K6
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run load tests
        env:
          API_HOST: localhost
          API_PORT: 8081
        run: make smoke-load-tests
