name: openapi-diff

on:
  pull_request:
    branches: ['main']

jobs:
  openapi-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Start application
        run: make start
      - name: Generate openapi spec
        run: make generate-openapi-spec
      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          add: '.github/openapi-spec/spec.yaml'
          message: 'feat(#${{ toJSON(github.event.number) }}): generate openapi spec'
      - name: Check out head branch
        uses: actions/checkout@v2
        with:
          path: head
      - name: Check out master branch
        uses: actions/checkout@v2
        with:
          ref: main
          path: base
      - name: Run OpenAPI Diff (from HEAD revision)
        uses: docker://openapitools/openapi-diff:latest
        with:
          args: '/github/workspace/base/.github/openapi-spec/spec.yaml /github/workspace/head/.github/openapi-spec/spec.yaml'
      - uses: actions/upload-artifact@v4
        with:
          name: diff-reports
          path: ./output
